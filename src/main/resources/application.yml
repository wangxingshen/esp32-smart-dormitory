server:
  port: 8080

spring:
  application:
    name: iot-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/iot_dormitory?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

iot:
  alarm:
    temperature-high: 30
    humidity-high: 80
    smoke-high: 300
    light-low: 100
  device:
    online-timeout-seconds: 30
